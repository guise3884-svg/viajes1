    <section class="seccion-contacto">
    <h2>Envíanos un mensaje</h2>
    <form action="#" method="post" class="formulario">
        
        <div class="grupo-entrada">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombres Completos" required>
        </div>
<br>
        <div class="grupo-entrada">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>
<br>
        <div class="grupo-entrada">
            <label for="mensaje">¿A qué destino te gustaría viajar?</label>
            <br>
            <br>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="Cuéntanos tus planes..." required></textarea>
        </div>
<br>
<br>
        <button type="submit" class="boton-enviar">Enviar Consulta</button>
        
    </form>
</section>
